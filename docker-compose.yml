# ─────────────────────────────────────────────────────────────────────────────
#  InvoiceHub v2.0 — Docker Compose PRODUCTION
#  Bridge Technologies Solutions — Douala, Cameroun
#
#  Usage :
#    docker compose up -d                  # tous les services
#    docker compose --profile ai up -d    # + Ollama (BTS Assistant)
#
#  Variables requises dans .env (voir .env.example) :
#    DB_PASSWORD, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET,
#    APP_URL, BACKEND_URL, NEXT_PUBLIC_API_URL, NEXT_PUBLIC_SOCKET_URL
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de données ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: invoicehub-db
    restart: unless-stopped
    volumes:
      - invoicehub_postgres:/var/lib/postgresql/data
      - ./invoicehub_schema_v3.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB:       invoicehub
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definir DB_PASSWORD dans .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoicehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bridge-net
    mem_limit: 384m

  # ── Cache / Queue ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: invoicehub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - invoicehub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bridge-net
    mem_limit: 128m

  # ── API Backend (NestJS) ─────────────────────────────────────────────────────
  api:
    build:
      context: ./invoicehub-api
      dockerfile: docker/Dockerfile
    image: invoicehub-api:latest
    container_name: invoicehub-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3005/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    env_file: .env
    environment:
      NODE_ENV:                    production
      PORT:                        3005
      DATABASE_URL:                postgresql://postgres:${DB_PASSWORD}@db:5432/invoicehub
      REDIS_URL:                   redis://redis:6379
      OLLAMA_URL:                  http://ollama:11434
      APP_URL:                     ${APP_URL:-http://invoicehub.bridgetech-solutions}
      BACKEND_URL:                 ${BACKEND_URL:-http://api.invoicehub.bridgetech-solutions}
      CORS_ORIGINS:                ${CORS_ORIGINS:-http://invoicehub.bridgetech-solutions}
      PUPPETEER_EXECUTABLE_PATH:   /usr/bin/chromium
    volumes:
      - invoicehub_uploads:/app/uploads
    networks:
      - bridge-net
    mem_limit: 1536m
    shm_size: 256m

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./bridge-frontend
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-http://api.invoicehub.bridgetech-solutions/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://api.invoicehub.bridgetech-solutions}
        NEXT_PUBLIC_APP_NAME:   InvoiceHub
    image: invoicehub-frontend:latest
    container_name: invoicehub-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT:     3001
    networks:
      - bridge-net
    mem_limit: 256m

  # ── BTS Assistant (optionnel) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: invoicehub-ollama
    restart: unless-stopped
    profiles:
      - ai
    volumes:
      - invoicehub_ollama:/root/.ollama
    networks:
      - bridge-net
    mem_limit: 3g

volumes:
  invoicehub_postgres:
  invoicehub_redis:
  invoicehub_uploads:
  invoicehub_ollama:

networks:
  bridge-net:
    driver: bridge
    name: bridge-net
