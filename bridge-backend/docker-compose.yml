# ─────────────────────────────────────────────────────────────────────────────
#  InvoiceHub v2.0 — Docker Compose (production)
#  Bridge Technologies Solutions — Douala, Cameroun
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15-alpine
    container_name: invoicehub-db
    restart: unless-stopped
    volumes:
      - invoicehub_postgres:/var/lib/postgresql/data
      - ../invoicehub_schema_v2.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: invoicehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definir DB_PASSWORD dans .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoicehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bridge-net
    mem_limit: 384m

  redis:
    image: redis:7-alpine
    container_name: invoicehub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - invoicehub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bridge-net
    mem_limit: 128m

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: invoicehub-api:latest
    container_name: invoicehub-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3005/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/invoicehub
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      # Configurable via .env — défaut = URLs de production
      APP_URL: ${APP_URL:-http://invoicehub.bridgetech-solutions}
      BACKEND_URL: ${BACKEND_URL:-http://api.invoicehub.bridgetech-solutions}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://invoicehub.bridgetech-solutions}
      # Force Chromium Linux — écrase le chemin Windows du .env dev
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - invoicehub_uploads:/app/uploads
    networks:
      - bridge-net
    # Chromium (PDF) consomme 200-400 MB — 1.5g évite les OOMKill
    mem_limit: 1536m
    # /dev/shm étendu pour Chromium headless (alternative à --disable-dev-shm-usage)
    shm_size: 256m

  ollama:
    image: ollama/ollama:latest
    container_name: invoicehub-ollama
    restart: unless-stopped
    profiles:
      - ai
    volumes:
      - invoicehub_ollama:/root/.ollama
    networks:
      - bridge-net
    mem_limit: 3g

  frontend:
    build:
      context: ../bridge-frontend
      dockerfile: docker/Dockerfile
      args:
        # URLs publiques (utilisées par le navigateur du client)
        # Configurable via .env — défaut = URLs de production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.invoicehub.bridgetech-solutions/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://api.invoicehub.bridgetech-solutions}
        NEXT_PUBLIC_APP_NAME: InvoiceHub
    image: invoicehub-frontend:latest
    container_name: invoicehub-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - bridge-net
    mem_limit: 256m

volumes:
  invoicehub_postgres:
  invoicehub_redis:
  invoicehub_uploads:
  invoicehub_ollama:

networks:
  bridge-net:
    driver: bridge
    name: bridge-net
