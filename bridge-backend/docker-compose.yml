# ─────────────────────────────────────────────────────────────────────────────
#  InvoiceHub v2.0 — Docker Compose (production)
#  Bridge Technologies Solutions — Douala, Cameroun
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15-alpine
    container_name: invoicehub-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../invoicehub_schema_v2.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: invoicehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definir DB_PASSWORD dans .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoicehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bridge-net
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: invoicehub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bridge-net
    mem_limit: 256m

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: invoicehub-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/invoicehub
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      # URL publique via Nginx
      APP_URL: https://invoicehub.bridgetech-solutions
      BACKEND_URL: https://api.invoicehub.bridgetech-solutions
      CORS_ORIGINS: https://invoicehub.bridgetech-solutions
    volumes:
      - uploads:/app/uploads
    networks:
      - bridge-net
    mem_limit: 1g

  ollama:
    image: ollama/ollama:latest
    container_name: invoicehub-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - bridge-net
    mem_limit: 4g

  frontend:
    build:
      context: ../bridge-frontend
      dockerfile: docker/Dockerfile
      args:
        # URLs publiques (utilisées par le navigateur du client)
        NEXT_PUBLIC_API_URL: https://api.invoicehub.bridgetech-solutions/api
        NEXT_PUBLIC_SOCKET_URL: https://api.invoicehub.bridgetech-solutions
        NEXT_PUBLIC_APP_NAME: InvoiceHub
    container_name: invoicehub-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - bridge-net
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:
  uploads:
  ollama_data:

networks:
  bridge-net:
    driver: bridge
    name: bridge-net
