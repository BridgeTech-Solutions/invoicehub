version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../invoicehub_schema_v2.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: invoicehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoicehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Surcharge des valeurs locales du .env incompatibles avec Docker
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@db:5432/invoicehub
      REDIS_URL: redis://redis:6379
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PGDUMP_PATH: pg_dump
      PGDUMP_DOCKER_CONTAINER: ""   # Désactivé — pg_dump est local au container
      # CORS : le frontend tourne sur le port 3001, le backend sur 3000
      APP_URL: ${APP_URL:-http://localhost:3001}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      # Ollama tourne sur le serveur hôte (host.docker.internal = la machine hôte)
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux : résout host.docker.internal vers l'hôte
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ../bridge-frontend
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
        NEXT_PUBLIC_APP_NAME: InvoiceHub
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001

volumes:
  postgres_data:
  redis_data:
  uploads:
