# Configuration Nginx complète pour BTS Hub
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    # ============================================================
    # Upstream : Services Docker
    # ============================================================
    
    # --- InvoiceHub ---
    upstream invoicehub_frontend {
        server invoicehub-frontend:3001;
    }
    upstream invoicehub_api {
        server invoicehub-api:3005;
    }

    # --- GAO Bridge ---
    upstream gao_app {
        server gao-app:3011;
    }

    # --- Futures Apps (Commentées pour éviter les erreurs au démarrage) ---
    # upstream app2_frontend {
    #     server app2:4001;
    # }

    # ============================================================
    # Serveur HTTP (redirection vers HTTPS)
    # ============================================================
    server {
        listen 80;
        server_name invoicehub.bridgetech-solutions api.invoicehub.bridgetech-solutions gao.bridgetech-solutions;

        return 301 https://$host$request_uri;
    }

    # ============================================================
    # HTTPS — InvoiceHub Frontend
    # ============================================================
    server {
        listen 443 ssl;
        server_name invoicehub.bridgetech-solutions www.invoicehub.bridgetech-solutions;

        ssl_certificate /etc/nginx/certs/bts-hub.crt;
        ssl_certificate_key /etc/nginx/certs/bts-hub.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://invoicehub_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # ============================================================
    # HTTPS — InvoiceHub API
    # ============================================================
    server {
        listen 443 ssl;
        server_name api.invoicehub.bridgetech-solutions;

        ssl_certificate /etc/nginx/certs/bts-hub.crt;
        ssl_certificate_key /etc/nginx/certs/bts-hub.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://invoicehub_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ============================================================
    # HTTPS — GAO Bridge
    # ============================================================
    server {
        listen 443 ssl;
        server_name gao.bridgetech-solutions;

        ssl_certificate /etc/nginx/certs/bts-hub.crt;
        ssl_certificate_key /etc/nginx/certs/bts-hub.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://gao_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================================
    # HTTPS — Application 2 (réservée — commentée pour éviter crash)
    # ============================================================
    # server {
    #     listen 443 ssl;
    #     server_name app2.bridgetech-solutions;
    #
    #     ssl_certificate /etc/nginx/certs/invoicehub.crt;
    #     ssl_certificate_key /etc/nginx/certs/invoicehub.key;
    #
    #     location / {
    #         proxy_pass http://app2_frontend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
