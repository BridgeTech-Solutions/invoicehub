# Configuration Nginx complète pour BTS Hub (HTTP uniquement)
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    # ============================================================
    # Serveurs HTTP
    # ============================================================
    # NOTE : pas de blocs upstream{} — ils sont résolus au démarrage et
    # font planter nginx si un conteneur est absent.
    # On utilise des variables + resolver 127.0.0.11 pour une résolution
    # DNS paresseuse (à la requête). Nginx démarre même si un conteneur
    # est down ; il retourne 502 uniquement pour les requêtes concernées.

    # InvoiceHub Frontend
    server {
        listen 80;
        server_name invoicehub.bridgetech-solutions www.invoicehub.bridgetech-solutions;

        location / {
            set $upstream_frontend "http://invoicehub-frontend:3001";
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # InvoiceHub API
    server {
        listen 80;
        server_name api.invoicehub.bridgetech-solutions;

        # Upload vidéos de formation (jusqu'à 500 Mo)
        client_max_body_size 500M;

        location / {
            set $upstream_api "http://invoicehub-api:3005";
            proxy_pass $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }
    }

    # GAO Bridge
    server {
        listen 80;
        server_name gao.bridgetech-solutions;

        location / {
            set $upstream_gao "http://gao-app:3011";
            proxy_pass $upstream_gao;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
